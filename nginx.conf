# /etc/nginx/sites-available/wikicious-backend
# VPS: 140.245.194.176  Domain: api.wikicious.io

server {
    listen 80;
    server_name api.wikicious.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.wikicious.io;

    ssl_certificate     /etc/letsencrypt/live/api.wikicious.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.wikicious.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        chunked_transfer_encoding on;
    }
}
